      .surface-soft { fill: #f9fbff; stroke: #d9e1ec; stroke-width: 1; }
      .line { stroke: #d9e1ec; stroke-width: 1; }
      .text { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #101828; }
      .muted { fill: #5b6b82; }
      .tiny { font-size: 12px; }
      .small { font-size: 13px; }
      .body { font-size: 14px; }
      .title { font-size: 20px; font-weight: 700; }
      .h2 { font-size: 15px; font-weight: 700; }
      .strong { font-weight: 700; }
      .nav { font-size: 14px; }
      .chip { font-size: 13px; font-weight: 600; }
      .btn { font-size: 13px; font-weight: 700; }
      .success-bg { fill: #e9f9ef; }
      .success { fill: #087443; }
      .warn-bg { fill: #fff7df; }
