  <text x="400" y="34" class="text nav">Customers</text>
  <text x="504" y="34" class="text nav">Packages</text>
  <text x="596" y="34" class="text nav">Products</text>
  <text x="685" y="34" class="text nav">Quotations</text>
  <text x="791" y="34" class="text nav">Invoices</text>
  <text x="879" y="34" class="text nav">Receipts</text>
