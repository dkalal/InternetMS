{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-md">
  <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-xl font-semibold tracking-tight text-slate-900">Password updated</h1>
    <p class="mt-1 text-sm text-slate-600">Your password has been set. You can log in now.</p>

    <a href="{% url 'login' %}" class="mt-6 inline-flex w-full items-center justify-center rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-600/30">
      Log in
    </a>
  </div>
</div>
{% endblock %}
