{% extends "base.html" %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-md">
  <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-xl font-semibold tracking-tight text-slate-900">Check your email</h1>
    <p class="mt-1 text-sm text-slate-600">
      If an account exists for the email you entered, you’ll receive password reset instructions shortly.
    </p>
    <p class="mt-3 text-sm text-slate-600">If you don’t see it, check your spam folder.</p>

    <a href="{% url 'login' %}" class="mt-6 inline-flex w-full items-center justify-center rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-600/30">
      Return to login
    </a>
  </div>
</div>
{% endblock %}
