{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-md">
  <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-xl font-semibold tracking-tight text-slate-900">Create account</h1>
    <p class="mt-1 text-sm text-slate-600">Sign up to get started.</p>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {% include "components/form.html" with form=form %}
      <button type="submit" class="inline-flex w-full items-center justify-center rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-600/30">
        Register
      </button>
    </form>

    <p class="mt-6 text-sm text-slate-600">
      Already have an account?
      <a class="text-brand-700 hover:underline" href="{% url 'login' %}">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
