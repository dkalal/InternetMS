{% extends "base.html" %}

{% block title %}Create Receipt{% endblock %}

{% block content %}
<div class="space-y-6">
  <div>
    <h1 class="text-xl font-semibold tracking-tight text-slate-900">Create receipt</h1>
    <p class="mt-1 text-sm text-slate-600">Invoice {{ invoice.number }} &middot; {{ invoice.customer.name }}</p>
  </div>

  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% include "components/form.html" with form=form %}
      <button type="submit" class="inline-flex w-full items-center justify-center rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-600/30">
        Create receipt
      </button>
    </form>
  </div>
</div>
{% endblock %}
