<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block print_title %}{{ document.get_document_type_display }} {{ document.number }}{% endblock %}</title>
  <style>
    @page {
      size: A4;
      margin: 12mm;
    }

    :root {
      --page-bg: #edf3f8;
      --paper: #ffffff;
      --ink: #122033;
      --muted: #5f6f82;
      --soft: #8ea0b4;
      --line: #d8e1eb;
      --line-strong: #bac9da;
      --navy: #0d3b66;
      --navy-deep: #082c4d;
      --navy-soft: #eaf2fb;
      --green: #17914a;
      --green-deep: #10733b;
      --green-soft: #e7f7ec;
      --slate-soft: #f7fafe;
      --shadow: 0 18px 42px rgba(11, 38, 66, 0.14);
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color-adjust: exact;
    }

    body {
      background: var(--page-bg);
      color: var(--ink);
      font-family: Aptos, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 12px;
      line-height: 1.5;
      padding: 20px;
    }

    .print-page {
      position: relative;
      width: 100%;
      max-width: 186mm;
      margin: 0 auto;
      background-color: #ffffff;
      background-image: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .print-page::before,
    .print-page::after {
      content: "";
      position: absolute;
      z-index: 0;
      width: 120px;
      height: 120px;
      background-color: var(--navy);
      background-image: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
      transform: skewX(-28deg);
      opacity: 0.98;
    }

    .print-page::before {
      top: -42px;
      left: -58px;
    }

    .print-page::after {
      right: -66px;
      bottom: -46px;
      background-color: var(--green);
      background-image: linear-gradient(135deg, var(--green) 0%, var(--navy) 100%);
    }

    .page-inner {
      position: relative;
      z-index: 1;
      padding: 14mm 11mm 10mm;
    }

    .section {
      margin-bottom: 10px;
    }

    .no-break {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .force-break {
      break-before: page;
      page-break-before: always;
    }

    .divider {
      height: 2px;
      margin: 8px 0 10px;
      background-color: rgba(13, 59, 102, 0.8);
      background-image: linear-gradient(90deg, rgba(13, 59, 102, 0.15) 0%, rgba(13, 59, 102, 0.8) 25%, rgba(13, 59, 102, 0.8) 75%, rgba(13, 59, 102, 0.15) 100%);
      border: 0;
    }

    .header {
      display: table;
      width: 100%;
      table-layout: fixed;
    }

    .header-left,
    .header-right {
      display: table-cell;
      vertical-align: top;
    }

    .header-left {
      width: 58%;
      padding-right: 18px;
    }

    .header-right {
      width: 42%;
    }

    .brand-row {
      display: table;
      width: 100%;
    }

    .brand-row.quotation-brand-stack {
      display: block;
    }

    .brand-logo,
    .brand-copy {
      display: table-cell;
      vertical-align: top;
    }

    .brand-logo {
      width: 80px;
      padding-right: 10px;
    }

    .brand-row.quotation-brand-stack .brand-logo,
    .brand-row.quotation-brand-stack .brand-copy {
      display: block;
    }

    .brand-row.quotation-brand-stack .brand-logo {
      width: 100%;
      padding-right: 0;
      margin-bottom: 10px;
    }

    .brand-row.quotation-brand-stack .logo-wrap {
      width: 100%;
      min-height: 86px;
      height: 86px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      line-height: normal;
      overflow: hidden;
    }

    .brand-row.quotation-brand-stack .logo {
      display: block;
      width: auto;
      max-width: 100%;
      max-height: 58px;
      height: auto;
      object-fit: contain;
      object-position: left center;
    }

    .brand-row.quotation-brand-stack .brand-copy {
      max-width: 100%;
    }

    .brand-row.quotation-brand-stack .brand-title {
      margin-top: 0;
    }

    .logo-wrap {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background-color: #f7fbff;
      background-image: linear-gradient(180deg, #ffffff 0%, #f2f7fc 100%);
      border: 1px solid #dce6f1;
      box-shadow: 0 8px 18px rgba(9, 39, 67, 0.08);
      text-align: center;
      line-height: 64px;
    }

    .logo {
      max-width: 50px;
      max-height: 50px;
      width: auto;
      height: auto;
      vertical-align: middle;
    }

    .brand-title {
      margin: 2px 0 2px;
      color: var(--navy-deep);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .brand-list li {
      position: relative;
      margin: 0 0 4px;
      padding-left: 16px;
      color: #304254;
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .brand-list li::before {
      content: "";
      position: absolute;
      top: 6px;
      left: 0;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background-color: var(--green);
      background-image: linear-gradient(180deg, var(--green) 0%, var(--navy) 100%);
    }

    .company-tax {
      margin-top: 6px;
      color: var(--navy-deep);
      font-size: 11px;
      font-weight: 700;
    }

    .meta-card,
    .panel,
    .totals-card,
    .table-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(10, 44, 73, 0.05);
    }

    .meta-card {
      padding: 12px 0 0;
      box-shadow: none;
      border: none;
      border-left: 1px solid var(--line-strong);
      border-radius: 0;
      padding-left: 16px;
      background: transparent;
    }

    .document-title {
      margin: 0 0 8px;
      color: var(--navy-deep);
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      text-align: right;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .meta-grid,
    .summary-grid {
      display: table;
      width: 100%;
    }

    .meta-row,
    .summary-row {
      display: table-row;
    }

    .meta-label,
    .meta-value,
    .summary-label,
    .summary-value {
      display: table-cell;
      padding: 4px 0;
      vertical-align: top;
      border-bottom: 1px solid rgba(186, 201, 218, 0.5);
    }

    .meta-row:last-child .meta-label,
    .meta-row:last-child .meta-value,
    .summary-row:last-child .summary-label,
    .summary-row:last-child .summary-value {
      border-bottom: none;
    }

    .meta-label,
    .summary-label {
      color: var(--muted);
      font-weight: 700;
      padding-right: 14px;
      white-space: nowrap;
    }

    .meta-value,
    .summary-value {
      text-align: right;
      font-weight: 800;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #c8d9ef;
      background: #edf4ff;
      color: var(--navy);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-badge.draft,
    .status-badge.cancelled {
      border-color: #d5dde6;
      background: #f4f7fa;
      color: #596777;
    }

    .status-badge.sent,
    .status-badge.issued,
    .status-badge.reissued {
      border-color: #c8d9ef;
      background: #edf4ff;
      color: var(--navy);
    }

    .status-badge.approved,
    .status-badge.paid {
      border-color: #c3ecd1;
      background: #edfbf2;
      color: var(--green-deep);
    }

    .status-badge.partially_paid {
      border-color: #f1ddb0;
      background: #fff7e7;
      color: #a36508;
    }

    .status-badge.rejected,
    .status-badge.overdue {
      border-color: #efc3c3;
      background: #fff0f0;
      color: #a92a2a;
    }

    .split-grid {
      display: table;
      width: 100%;
      table-layout: fixed;
      margin-bottom: 10px;
    }

    .split-col {
      display: table-cell;
      vertical-align: top;
    }

    .split-col:first-child {
      width: 48%;
      padding-right: 10px;
    }

    .split-col:last-child {
      width: 52%;
      padding-left: 10px;
    }

    .bottom-grid {
      display: table;
      width: 100%;
      table-layout: fixed;
      margin-top: 8px;
    }

    .bottom-col {
      display: table-cell;
      vertical-align: top;
    }

    .bottom-col:first-child {
      width: 54%;
      padding-right: 10px;
    }

    .bottom-col:last-child {
      width: 46%;
      padding-left: 10px;
    }

    .bottom-grid.quotation-bottom-grid .payment-col {
      width: 58%;
      padding-right: 10px;
    }

    .bottom-grid.quotation-bottom-grid .totals-col {
      width: 42%;
      padding-left: 10px;
    }

    .panel {
      overflow: hidden;
    }

    .panel.quote-panel .panel-body {
      padding: 14px 16px;
    }

    .quote-overview-panel {
      margin-bottom: 2px;
    }

    .quote-overview-panel .panel-body {
      padding: 0;
    }

    .quote-bill-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 108px 108px;
      align-items: start;
      width: 100%;
    }

    .quote-bill-grid.extended {
      grid-template-columns: minmax(0, 1fr) 84px 84px 92px;
    }

    .quote-overview-panel .quote-bill-grid:not(.extended) .quote-bill-meta-value {
      font-size: 10.5px;
      white-space: normal;
    }

    .quote-bill-main,
    .quote-bill-meta {
      padding: 10px 14px 8px;
    }

    .quote-bill-main {
      min-width: 0;
      padding-right: 18px;
    }

    .quote-bill-meta {
      border-left: 1px solid var(--line);
      text-align: left;
      min-width: 0;
    }

    .quote-bill-label {
      display: block;
      margin-bottom: 3px;
      color: var(--soft);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .quote-bill-name {
      margin: 0;
      color: var(--navy-deep);
      font-size: 16px;
      line-height: 1.15;
      font-weight: 900;
    }

    .quote-bill-main p {
      margin: 4px 0 0;
      max-width: 76%;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.35;
      font-weight: 500;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .quote-bill-meta-value {
      display: block;
      color: var(--ink);
      font-size: 11px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0;
      overflow-wrap: normal;
      word-break: normal;
    }

    .panel-head {
      padding: 7px 12px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      background-color: var(--navy-deep);
      background-image: linear-gradient(90deg, var(--navy-deep) 0%, var(--navy) 100%);
    }

    .panel-head.green {
      color: var(--green-deep);
      background-color: #e7f7ec;
      background-image: linear-gradient(90deg, #dff5e8 0%, #eef9f1 100%);
      border-bottom: 1px solid #cde7d7;
    }

    .panel-head.light {
      color: var(--navy-deep);
      background-color: #f3f8fc;
      background-image: linear-gradient(90deg, #eff5fb 0%, #f9fbfd 100%);
      border-bottom: 1px solid var(--line);
    }

    .panel-body {
      padding: 10px 12px;
    }

    .card-title {
      margin: 0 0 4px;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 800;
      color: var(--navy-deep);
    }

    .sub-copy,
    .notes-copy,
    .footer-copy {
      margin: 0;
      color: #324558;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .muted-empty {
      color: var(--soft);
    }

    .identity-list {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .identity-list.compact {
      margin-top: 6px;
      padding-top: 6px;
    }

    .identity-line {
      margin: 0;
      display: inline-block;
      min-width: 48%;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .identity-label {
      display: block;
      margin-bottom: 2px;
      color: var(--soft);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .identity-value {
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }

    .summary-box {
      border-left: 5px solid var(--green);
      border-radius: 12px;
      background-color: #f1faf4;
      background-image: linear-gradient(90deg, #edf9f0 0%, #f5fbf6 100%);
      padding: 10px 12px;
      min-height: 92px;
    }

    .summary-box.blue {
      border-left-color: var(--navy);
      background-color: #f1f7ff;
      background-image: linear-gradient(90deg, #edf4ff 0%, #f7fbff 100%);
    }

    .summary-title {
      margin: 0 0 6px;
      color: var(--green-deep);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .summary-box.blue .summary-title {
      color: var(--navy-deep);
    }

    .quote-sheet-panel {
      border-radius: 12px;
      box-shadow: 0 8px 18px rgba(10, 44, 73, 0.04);
    }

    .quote-sheet-body {
      display: table;
      width: 100%;
      table-layout: fixed;
      padding: 0;
    }

    .quote-sheet-block {
      display: table-cell;
      vertical-align: top;
    }

    .quote-party-block {
      width: 58%;
      border-right: 1px solid var(--line);
    }

    .quote-detail-block {
      width: 42%;
      background-color: #f8fbfe;
      background-image: linear-gradient(180deg, #fbfdff 0%, #f5f9fd 100%);
    }

    .quote-sheet-row {
      display: table;
      width: 100%;
      table-layout: fixed;
      border-bottom: 1px solid var(--line);
    }

    .quote-sheet-row:last-child {
      border-bottom: none;
    }

    .quote-sheet-label,
    .quote-sheet-value {
      display: table-cell;
      padding: 9px 12px;
      vertical-align: top;
    }

    .quote-sheet-label {
      width: 26%;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-right: 1px solid rgba(186, 201, 218, 0.55);
      background: #f9fbfd;
    }

    .quote-sheet-value {
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .quote-sheet-customer {
      color: var(--navy-deep);
      font-size: 18px;
      font-weight: 900;
    }

    .summary-emphasis {
      color: var(--green-deep);
      font-weight: 900;
    }

    .table-card {
      overflow: hidden;
      margin-bottom: 8px;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .items-table th {
      padding: 8px 10px;
      background-color: var(--navy);
      background-image: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: left;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
    }

    .items-table th:last-child {
      border-right: none;
    }

    .items-table td {
      padding: 8px 10px;
      border-top: 1px solid var(--line);
      border-right: 1px solid #e4ebf3;
      vertical-align: top;
      background: #ffffff;
      overflow-wrap: anywhere;
    }

    .items-table tr,
    .items-table td,
    .items-table th {
      page-break-inside: avoid;
    }

    .items-table td:last-child {
      border-right: none;
    }

    .item-cell {
      display: table;
      width: 100%;
    }

    .item-icon,
    .item-copy {
      display: table-cell;
      vertical-align: middle;
    }

    .item-icon {
      width: 38px;
      padding-right: 8px;
    }

    .item-icon-badge {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background-color: #e3f5ea;
      background-image: linear-gradient(180deg, #e9f8ef 0%, #d9f0e3 100%);
      color: var(--green-deep);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
      line-height: 28px;
    }

    .item-title {
      display: block;
      margin-bottom: 2px;
      color: var(--ink);
      font-weight: 800;
      font-size: 13px;
    }

    .item-subtitle {
      color: var(--muted);
      font-size: 11px;
    }

    .quotation-items-table th,
    .quotation-items-table td {
      border-right-color: #c5d2df;
    }

    .quotation-items-table th {
      padding: 9px 10px;
      background-color: #153c60;
      background-image: linear-gradient(180deg, #1a4268 0%, var(--navy-deep) 100%);
    }

    .quotation-items-table td {
      padding-top: 7px;
      padding-bottom: 7px;
    }

    .quotation-items-table .item-cell {
      display: block;
    }

    .quotation-items-table .item-copy {
      display: block;
    }

    .quotation-items-table .item-title {
      margin-bottom: 3px;
      font-size: 12px;
    }

    .quotation-items-table .item-subtitle {
      display: block;
      line-height: 1.45;
    }

    .quotation-serial {
      text-align: center;
      font-weight: 800;
      color: var(--navy-deep);
    }

    .text-right {
      text-align: right;
    }

    .total-amount {
      color: var(--green-deep);
      font-weight: 900;
    }

    .empty-state {
      padding: 18px 10px;
      color: var(--soft);
      text-align: center;
    }

    .totals-card {
      width: 100%;
      overflow: hidden;
    }

    .quotation-totals-card {
      margin-top: 0;
    }

    .totals-table {
      width: 100%;
      border-collapse: collapse;
    }

    .totals-table td {
      padding: 8px 12px;
      border-top: 1px solid var(--line);
    }

    .totals-table tr:first-child td {
      border-top: none;
    }

    .totals-label {
      color: #334659;
      font-weight: 700;
    }

    .totals-value {
      text-align: right;
      color: var(--ink);
      font-weight: 800;
    }

    .grand-total td {
      background-color: #e7f7ec;
      background-image: linear-gradient(90deg, #dff5e8 0%, #eef9f1 100%);
      color: var(--green-deep);
      font-size: 15px;
      font-weight: 900;
    }

    .payment-grid {
      display: table;
      width: 100%;
    }

    .payment-row {
      display: table-row;
    }

    .payment-label,
    .payment-value {
      display: table-cell;
      padding: 5px 0;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    .payment-row:last-child .payment-label,
    .payment-row:last-child .payment-value {
      border-bottom: none;
    }

    .payment-label {
      width: 32%;
      color: var(--muted);
      font-weight: 700;
      padding-right: 12px;
    }

    .payment-value {
      color: var(--ink);
      font-weight: 800;
    }

    .note-list {
      margin: 0;
      padding-left: 18px;
      color: #304254;
    }

    .note-list.compact {
      padding-left: 16px;
    }

    .note-list li {
      margin-bottom: 5px;
    }

    .note-list.compact li:last-child {
      margin-bottom: 0;
    }

    .small-tag-row {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 10px;
      background-color: #f0faf3;
      background-image: linear-gradient(90deg, #edf9f0 0%, #f4fbf6 100%);
      color: #3d5b4a;
      font-size: 10px;
      font-weight: 700;
    }

    .receipt-note {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .closing-notes-section {
      margin-top: 8px;
      margin-bottom: 0;
    }

    .quotation-payment-panel .panel-body {
      min-height: 119px;
    }

    .quotation-payment-panel .panel-body {
      padding: 10px 12px 12px;
    }

    .quotation-payment-panel .notes-copy {
      line-height: 1.65;
      color: #21364a;
    }

    .thanks-band {
      margin: 10px 0 0;
      text-align: center;
      color: var(--navy-deep);
      font-weight: 900;
      font-style: italic;
      font-size: 16px;
    }

    .thanks-sub {
      margin: 4px 0 0;
      text-align: center;
      color: #35506a;
      font-size: 12px;
      font-weight: 700;
    }

    .footer-strip {
      margin-top: 10px;
      padding: 10px 12px;
      background-color: var(--navy-deep);
      background-image: linear-gradient(90deg, var(--navy-deep) 0%, var(--navy) 65%, #0f5682 100%);
      color: #ffffff;
    }

    .footer-strip table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .footer-strip td {
      padding: 0 6px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      border-right: 1px solid rgba(255, 255, 255, 0.16);
      overflow-wrap: anywhere;
    }

    .footer-status {
      font-weight: 800;
    }

    .footer-strip td:last-child {
      border-right: none;
    }

    .print-page,
    .print-page::before,
    .print-page::after,
    .logo-wrap,
    .status-badge,
    .panel-head,
    .summary-box,
    .quote-detail-block,
    .items-table th,
    .item-icon-badge,
    .grand-total td,
    .small-tag-row,
    .footer-strip {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color-adjust: exact;
      forced-color-adjust: none;
    }

    @media print {
      html,
      body {
        background: #ffffff;
        padding: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color-adjust: exact;
      }

      .print-page {
        width: 100%;
        max-width: none;
        box-shadow: none;
      }

      .print-page,
      .print-page::before,
      .print-page::after,
      .logo-wrap,
      .status-badge,
      .panel-head,
      .summary-box,
      .quote-detail-block,
      .items-table th,
      .item-icon-badge,
      .grand-total td,
      .small-tag-row,
      .footer-strip {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color-adjust: exact;
        forced-color-adjust: none;
      }

      .footer-strip,
      .thanks-band,
      .thanks-sub {
        page-break-inside: avoid;
      }
    }
  </style>
</head>

    <div class="page-inner">

  </div>
