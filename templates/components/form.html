{% if form.non_field_errors %}
  <div class="rounded-md border border-rose-200 bg-rose-50 p-3 text-sm text-rose-700">
    {% for error in form.non_field_errors %}
      <div>{{ error }}</div>
    {% endfor %}
  </div>
{% endif %}

<div class="space-y-4">
  {% for field in form %}
    {% include "components/form_field.html" with field=field %}
  {% endfor %}
</div>
