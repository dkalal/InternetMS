{% extends "base.html" %}

{% block title %}Logged Out{% endblock %}

{% block content %}
<div class="flex min-h-full items-center justify-center py-10">
  <div class="w-full max-w-md">
    <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="text-xl font-semibold tracking-tight text-slate-900">Logged out</h1>
      <p class="mt-1 text-sm text-slate-600">You have been successfully logged out.</p>

      <a href="{% url 'login' %}" class="mt-6 inline-flex w-full items-center justify-center rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-600/30">
        Log in again
      </a>
    </div>
  </div>
</div>
{% endblock %}
